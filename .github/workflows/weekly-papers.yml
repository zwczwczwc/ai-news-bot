name: Weekly Papers - Horizon

on:
  # 每周一北京时间 8:00 (UTC 周一 0:00)
  schedule:
    - cron: '0 0 * * 1'
  # 支持手动触发测试
  workflow_dispatch:
    inputs:
      hours:
        description: '抓取过去多少小时的内容'
        required: false
        default: '168'
        type: string

env:
  DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
  FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
  FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

jobs:
  generate-papers:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Clone Horizon
        run: git clone https://github.com/Thysrael/Horizon.git /tmp/horizon

      - name: Create Papers config
        run: |
          mkdir -p /tmp/horizon/data
          cat > /tmp/horizon/data/config.json << 'EOF'
          {
            "version": "1.0",
            "ai": {
              "provider": "openai",
              "model": "kimi-k2.5",
              "api_key_env": "DASHSCOPE_API_KEY",
              "base_url": "https://coding.dashscope.aliyuncs.com/v1",
              "temperature": 0.3,
              "max_tokens": 4096
            },
            "sources": {
              "hackernews": {
                "enabled": true,
                "fetch_top_stories": 20,
                "min_score": 50
              },
              "rss": [
                {
                  "name": "arXiv AI",
                  "url": "http://export.arxiv.org/rss/cs.AI",
                  "enabled": true
                },
                {
                  "name": "arXiv ML",
                  "url": "http://export.arxiv.org/rss/cs.LG",
                  "enabled": true
                },
                {
                  "name": "arXiv CL",
                  "url": "http://export.arxiv.org/rss/cs.CL",
                  "enabled": true
                },
                {
                  "name": "arXiv CV",
                  "url": "http://export.arxiv.org/rss/cs.CV",
                  "enabled": true
                },
                {
                  "name": "Papers with Code",
                  "url": "https://paperswithcode.com/rss",
                  "enabled": true
                },
                {
                  "name": "Distill.pub",
                  "url": "https://distill.pub/rss.xml",
                  "enabled": true
                }
              ],
              "reddit": {
                "enabled": false
              },
              "github": [
                {
                  "type": "user_events",
                  "username": "karpathy",
                  "enabled": true
                },
                {
                  "type": "user_events",
                  "username": "YannLeCun",
                  "enabled": true
                },
                {
                  "type": "user_events",
                  "username": "huggingface",
                  "enabled": true
                }
              ]
            },
            "filtering": {
              "ai_score_threshold": 6.0,
              "time_window_hours": 168
            }
          }
          EOF

      - name: Run Horizon
        run: |
          cd /tmp/horizon
          uv sync --frozen --no-dev
          uv run horizon
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      - name: Save report
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          cp /tmp/horizon/data/summaries/*.md $GITHUB_WORKSPACE/output/report.md
          ls -la $GITHUB_WORKSPACE/output/

      - name: Upload to Feishu
        run: |
          pip install requests
          export DOC_TITLE="📚 论文周报 - $(date +%Y-%m-%d)"
          python3 scripts/upload_to_feishu.py
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          OWNER_OPEN_ID: "ou_f80617e98f143959124726775f8ae7d7"

      - name: Cleanup
        run: rm -rf /tmp/horizon
