name: Daily GitHub Hot Projects

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0:00
  workflow_dispatch:

env:
  DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
  FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
  FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

jobs:
  generate-github-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Clone Horizon
        run: git clone https://github.com/zwczwczwc/Horizon.git /tmp/horizon

      - name: Create GitHub-focused config
        run: |
          mkdir -p /tmp/horizon/data
          cat > /tmp/horizon/data/config.json << 'EOF'
          {
            "version": "1.0",
            "ai": {
              "provider": "openai",
              "model": "kimi-k2.5",
              "api_key_env": "DASHSCOPE_API_KEY",
              "base_url": "https://coding.dashscope.aliyuncs.com/v1",
              "temperature": 0.3,
              "max_tokens": 4096
            },
            "sources": {
              "hackernews": {
                "enabled": true,
                "fetch_top_stories": 30,
                "min_score": 50
              },
              "rss": [
                {
                  "name": "GitHub Blog",
                  "url": "https://github.blog/feed/",
                  "enabled": true
                }
              ],
              "reddit": {
                "enabled": false
              },
              "github": [
                {"type": "repo_releases", "owner": "facebook", "repo": "react", "enabled": true},
                {"type": "repo_releases", "owner": "microsoft", "repo": "vscode", "enabled": true},
                {"type": "repo_releases", "owner": "vercel", "repo": "next.js", "enabled": true},
                {"type": "repo_releases", "owner": "openai", "repo": "openai-python", "enabled": true},
                {"type": "user_events", "username": "torvalds", "enabled": true}
              ]
            },
            "filtering": {
              "ai_score_threshold": 6.0,
              "time_window_hours": 24
            }
          }
          EOF

      - name: Run Horizon
        run: |
          cd /tmp/horizon
          uv sync --frozen --no-dev
          uv run horizon
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      - name: Save GitHub report
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          cp /tmp/horizon/data/summaries/*.md $GITHUB_WORKSPACE/output/github-report.md
          ls -la $GITHUB_WORKSPACE/output/

      - name: Upload to Feishu (GitHub Section)
        run: |
          pip install requests
          python3 scripts/merge_to_feishu.py "$GITHUB_WORKSPACE/output/github-report.md" "github"

      - name: Cleanup
        run: rm -rf /tmp/horizon
