name: Daily AI News - Horizon

on:
  # 每天北京时间 8:00 (UTC 0:00)
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发测试
  workflow_dispatch:
    inputs:
      hours:
        description: '抓取过去多少小时的新闻'
        required: false
        default: '24'
        type: string

env:
  # 从 Secrets 读取，如果不存在则为空字符串
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

jobs:
  generate-news:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装 uv (Horizon 使用的包管理器)
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # 4. 克隆 Horizon 仓库
      - name: Clone Horizon
        run: |
          git clone https://github.com/Thysrael/Horizon.git /tmp/horizon
          cd /tmp/horizon

      # 5. 创建优化配置 (减少内存占用)
      - name: Create optimized config
        run: |
          mkdir -p /tmp/horizon/data
          cat > /tmp/horizon/data/config.json << 'EOF'
          {
            "sources": {
              "rss": [
                "https://news.ycombinator.com/rss",
                "https://www.reddit.com/r/MachineLearning/.rss",
                "https://www.reddit.com/r/artificial/.rss",
                "https://blog.google/technology/ai/rss/"
              ],
              "github": {
                "enabled": true,
                "repos": [
                  "microsoft/generative-ai-for-beginners",
                  "microsoft/promptflow"
                ]
              },
              "telegram": {
                "enabled": false
              },
              "reddit": {
                "enabled": true,
                "subreddits": ["MachineLearning", "artificial", "LocalLLaMA"]
              }
            },
            "ai": {
              "provider": "openai",
              "base_url": "https://dashscope.aliyuncs.com/compatible-mode/v1",
              "model": "kimi-k2.5",
              "score_threshold": 6.0,
              "max_concurrent": 3
            },
            "output": {
              "format": "markdown",
              "language": "zh",
              "max_items": 20
            },
            "features": {
              "web_search": false,
              "community_voices": false,
              "cross_source_dedup": true,
              "email_subscription": false
            }
          }
          EOF

      # 6. 检查可用的 API Key
      - name: Check API keys
        run: |
          echo "检查可用的 AI API..."
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "✓ Gemini API Key 已配置"
          fi
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "✓ OpenAI API Key 已配置"
          fi
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "✓ Anthropic API Key 已配置"
          fi
          if [ -n "$DEEPSEEK_API_KEY" ]; then
            echo "✓ DeepSeek API Key 已配置"
          fi
          if [ -n "$DASHSCOPE_API_KEY" ]; then
            echo "✓ DashScope API Key 已配置"
          fi
          if [ -z "$GEMINI_API_KEY" ] && [ -z "$OPENAI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$DEEPSEEK_API_KEY" ] && [ -z "$DASHSCOPE_API_KEY" ]; then
            echo "⚠️ 警告: 未配置任何 AI API Key，将只抓取新闻不进行 AI 评分"
          fi

      # 7. 安装依赖并运行
      - name: Install and run Horizon
        run: |
          cd /tmp/horizon
          uv sync --frozen --no-dev
          uv run horizon --hours ${{ github.event.inputs.hours || '24' }} || echo "Horizon 运行完成或遇到错误"

      # 8. 保存生成的日报
      - name: Save output
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          cp /tmp/horizon/output/*.md $GITHUB_WORKSPACE/output/ 2>/dev/null || true
          cp /tmp/horizon/output/*.json $GITHUB_WORKSPACE/output/ 2>/dev/null || true
          ls -la $GITHUB_WORKSPACE/output/ || echo "输出目录为空或不存在"

      # 9. 上传到 Artifacts (保留 7 天)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-${{ github.run_number }}
          path: output/
          retention-days: 7

      # 10. 发送到飞书 (如果配置了 webhook)
      - name: Send to Feishu
        if: env.FEISHU_WEBHOOK != ''
        run: |
          if [ -f "$GITHUB_WORKSPACE/output/daily_report.md" ]; then
            CONTENT=$(cat "$GITHUB_WORKSPACE/output/daily_report.md" | sed 's/"/\\"/g' | head -c 15000)
            curl -X POST "$FEISHU_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"msg_type\": \"text\", \"content\": {\"text\": \"${CONTENT}\"}}"
          else
            echo "日报文件未生成，跳过飞书通知"
          fi

      # 11. 清理
      - name: Cleanup
        run: |
          rm -rf /tmp/horizon
