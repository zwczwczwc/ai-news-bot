name: Daily AI News - Horizon

on:
  # 每天北京时间 8:00 (UTC 0:00)
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发测试
  workflow_dispatch:
    inputs:
      hours:
        description: '抓取过去多少小时的新闻'
        required: false
        default: '24'
        type: string

env:
  # 从 Secrets 读取
  DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
  FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

jobs:
  generate-news:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装 uv
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # 4. 克隆 Horizon
      - name: Clone Horizon
        run: git clone https://github.com/Thysrael/Horizon.git /tmp/horizon

      # 5. 创建正确的配置文件
      - name: Create Horizon config
        run: |
          mkdir -p /tmp/horizon/data
          cat > /tmp/horizon/data/config.json << 'EOF'
          {
            "version": "1.0",
            "ai": {
              "provider": "openai",
              "model": "kimi-k2.5",
              "api_key_env": "DASHSCOPE_API_KEY",
              "base_url": "https://coding.dashscope.aliyuncs.com/v1",
              "temperature": 0.3,
              "max_tokens": 4096
            },
            "sources": {
              "hackernews": {
                "enabled": true,
                "fetch_top_stories": 20,
                "min_score": 50
              },
              "rss": [
                {
                  "name": "Hacker News",
                  "url": "https://news.ycombinator.com/rss",
                  "enabled": true,
                  "category": "tech"
                },
                {
                  "name": "Google AI Blog",
                  "url": "https://blog.google/technology/ai/rss/",
                  "enabled": true,
                  "category": "ai"
                }
              ],
              "reddit": {
                "enabled": false
              },
              "github": []
            },
            "filtering": {
              "ai_score_threshold": 6.0,
              "time_window_hours": ${{ github.event.inputs.hours || '24' }}
            }
          }
          EOF

      # 6. 运行 Horizon
      - name: Run Horizon
        run: |
          cd /tmp/horizon
          uv sync --frozen --no-dev
          uv run horizon
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      # 7. 保存输出
      - name: Save output
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          cp /tmp/horizon/output/* $GITHUB_WORKSPACE/output/ 2>/dev/null || true
          ls -la $GITHUB_WORKSPACE/output/

      # 8. 上传 Artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-${{ github.run_number }}
          path: output/
          retention-days: 7

      # 9. 发送到飞书 (如果配置了 webhook)
      - name: Send to Feishu
        if: env.FEISHU_WEBHOOK != ''
        run: |
          if [ -f "$GITHUB_WORKSPACE/output/daily_report.md" ]; then
            CONTENT=$(cat "$GITHUB_WORKSPACE/output/daily_report.md" | head -c 15000)
            curl -X POST "$FEISHU_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"msg_type\": \"text\", \"content\": {\"text\": \"${CONTENT}\"}}"
          fi

      # 10. 清理
      - name: Cleanup
        run: rm -rf /tmp/horizon
